name: Lint and test

on:
  workflow_call:
    inputs:
      os:
        description: "Operating system"
        required: true
        type: string
      python-version:
        description: "Python version"
        required: true
        type: string

defaults:
  run:
    shell: bash

jobs:
  lint-ruff:
    name: Lint with ruff (py${{ inputs.python-version }} on ${{ inputs.os }})
    runs-on: ${{ inputs.os }}
    steps:
      - uses: asottile/workflows/.github/actions/fast-checkout@v1.11.0

      - name: Install poetry and dependencies
        uses: ./.github/actions/install-dependencies
        with:
          os: ${{ inputs.os }}
          python-version: ${{ inputs.python-version }}

      - name: Ensure ruff cache directory exists
        run: mkdir -p .ruff_cache

      - name: Load ruff cache
        id: cached-flakeheaven
        uses: actions/cache/restore@v5
        with:
          key: ruff-${{ inputs.python-version }}-${{ runner.os }}-${{ hashFiles('pyproject.toml', 'poetry.lock') }}
          restore-keys: |
            ruff-${{ inputs.python-version }}-${{ runner.os }}-
          path: .ruff_cache

      - name: Run ruff
        run: poetry run ruff check .

      - name: Save ruff cache
        if: always() && steps.cached-flakeheaven.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          key: ${{ steps.cached-flakeheaven.outputs.cache-primary-key }}
          path: .ruff_cache

  lint-mypy:
    name: Lint with mypy (py${{ inputs.python-version }} on ${{ inputs.os }})
    runs-on: ${{ inputs.os }}
    steps:
      - uses: asottile/workflows/.github/actions/fast-checkout@v1.11.0

      - name: Install poetry and dependencies
        uses: ./.github/actions/install-dependencies
        with:
          os: ${{ inputs.os }}
          python-version: ${{ inputs.python-version }}

      - name: Ensure mypy cache directory exists
        run: mkdir -p .mypy_cache

      - name: Load .mypy_cache
        id: cached-mypy
        uses: actions/cache/restore@v5
        with:
          key: mypy-${{ inputs.python-version }}-${{ runner.os }}-${{ hashFiles('pyproject.toml', 'poetry.lock') }}
          restore-keys: |
            mypy-${{ inputs.python-version }}-${{ runner.os }}-
          path: .mypy_cache

      - name: Run mypy
        run: poetry run mypy --enable-incomplete-feature=Unpack vkbottle

      - name: Save .mypy_cache
        if: always() && steps.cached-mypy.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          key: ${{ steps.cached-mypy.outputs.cache-primary-key }}
          path: .mypy_cache

  test:
    name: Run tests (py${{ inputs.python-version }} on ${{ inputs.os }})
    runs-on: ${{ inputs.os }}
    steps:
      - uses: asottile/workflows/.github/actions/fast-checkout@v1.11.0

      - name: Install poetry and dependencies
        uses: ./.github/actions/install-dependencies
        with:
          os: ${{ inputs.os }}
          python-version: ${{ inputs.python-version }}

      - name: Ensure pytest cache directory exists
        run: mkdir -p .pytest_cache

      - name: Load .pytest_cache
        id: cached-pytest
        uses: actions/cache/restore@v5
        with:
          key: pytest-${{ inputs.python-version }}-${{ runner.os }}-${{ hashFiles('pyproject.toml', 'poetry.lock') }}
          restore-keys: |
            pytest-${{ inputs.python-version }}-${{ runner.os }}-
          path: .pytest_cache

      - name: Run tests
        run: poetry run pytest

      - name: Save .pytest_cache
        if: always() && steps.cached-pytest.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          key: ${{ steps.cached-pytest.outputs.cache-primary-key }}
          path: .pytest_cache
