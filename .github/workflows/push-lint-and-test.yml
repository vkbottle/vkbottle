name: Lint and test

on:
  push:
    branches:
      - dev

defaults:
  run:
    shell: bash

jobs:
  lint-and-test:
    if: github.repository == 'vkbottle/vkbottle'
    strategy:
      matrix:
        python-version:
          - "3.10"
          - "3.14"
        os:
          - ubuntu-latest
          - windows-latest

    uses: ./.github/workflows/lint-and-test.yml
    with:
      os: ${{ matrix.os }}
      python-version: ${{ matrix.python-version }}
